# Initialize of crazyflies
cf1:
  enabled: true
  uri: radio://0/80/2M/E7E7E7E701
  initial_position: [0.0, 0.0, 0.0]
  type: cf21

# Definition of the various robot types
robot_types:
  cf21:
    enabled: true
    motion_capture:
      enabled: true
      tracking: "librigidbodytracker"
      marker: default_single_marker
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

# global settings for all robots
all:
  enabled: true
  firmware_logging:
    enabled: true
    verbose: false
    default_topics:
      pose:
        frequency: 10
      status:
        frequency: 1
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2 # 1: complementary, 2: kalman
      controller: 2 # 1: PID, 2: mellinger
    locSrv:
      extPosStdDev: 1e-3 # Pos error tolerance
