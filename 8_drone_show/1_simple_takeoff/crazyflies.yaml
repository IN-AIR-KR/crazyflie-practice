# Initialize of crazyflies
robots:
  cf1:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E7E8
    initial_position: [0.0, 0.0, 0.0]
    type: cf21

# Definition of the various robot types
robot_types:
  cf21:
    enabled: true
    motion_capture:
      enabled: false
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

# global settings for all robots
all:
  enabled: true
  firmware_logging:
    enabled: true
    verbose: false
    default_topics:
      pose:
        frequency: 10
      status:
        frequency: 1
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2 # 1: complementary, 2: kalman
      controller: 1 # 1: PID, 2: mellinger
    kalman:
      resetEstimation: 1
  reference_frame: "world"
  broadcasts:
    num_repeats: 15
    delay_between_repeats_ms: 1
